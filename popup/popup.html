<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Anti Scroll</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="topbar-text">
          <h1>Anti Scroll</h1>
          <p id="currentHost" class="muted">Checking tab&hellip;</p>
        </div>
        <span id="statusPill" class="pill" role="status">Off</span>
      </header>

      <section class="card mode-row" role="group" aria-label="Blocking mode">
        <button id="modeDisabled" type="button" data-mode="disabled" aria-pressed="false">Off</button>
        <button id="modeSelected" type="button" data-mode="selected" aria-pressed="false">Selected</button>
        <button id="modeAll" type="button" data-mode="all" aria-pressed="false">All sites</button>
      </section>

      <section class="card timer-card" aria-label="Timer">
        <div class="timer-row">
          <label for="durationMinutes">Run for</label>
          <input
            id="durationMinutes"
            type="number"
            inputmode="numeric"
            min="1"
            max="1440"
            step="1"
            value="30"
            aria-label="Duration in minutes"
          >
          <span class="unit">min</span>
          <button id="startTimer" class="primary" type="button">Start</button>
          <button id="clearTimer" class="plain" type="button">Clear</button>
        </div>
        <p id="timerStatus" class="timer-status" role="status">No timer set</p>
      </section>

      <section class="card current-row" aria-label="Current site">
        <span id="currentStatus">This page is allowed</span>
        <div class="current-actions">
          <button id="pauseCurrent" class="plain" type="button">15m Pause</button>
          <button id="toggleCurrent" type="button">Add Site</button>
        </div>
      </section>

      <section class="card sites" aria-label="Sites">
        <div class="sites-head">
          <h2 id="sitesLabel">Sites</h2>
          <div class="sites-actions">
            <button id="selectAll" class="plain" type="button">Select all</button>
            <button id="clearSelected" class="plain" type="button">Clear</button>
          </div>
        </div>
        <div class="sites-search">
          <input
            id="siteSearch"
            type="search"
            autocomplete="off"
            spellcheck="false"
            placeholder="Search or type a domain"
            aria-label="Search sites or type a domain to add"
          >
        </div>
        <div id="siteList" class="site-list" role="list" aria-labelledby="sitesLabel"></div>
      </section>

      <section class="card options" aria-label="Options">
        <label>
          <input id="strictFeeds" type="checkbox">
          <span>Hide feeds</span>
        </label>
        <label>
          <input id="allowEditableFields" type="checkbox">
          <span>Allow typing fields</span>
        </label>
        <label>
          <input id="allowMessagingPages" type="checkbox">
          <span>Allow messages</span>
        </label>
      </section>

      <footer class="footer">
        <span id="attemptTotal" class="stat">0 blocked</span>
        <button id="resetStats" class="plain" type="button">Reset</button>
      </footer>
    </main>

    <script src="../src/constants.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
